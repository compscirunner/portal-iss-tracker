<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="75%">
      <stop offset="0%" stop-color="#16386e"/>
      <stop offset="55%" stop-color="#0b1f44"/>
      <stop offset="100%" stop-color="#05070f"/>
    </radialGradient>
    <radialGradient id="globe" cx="40%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#57d6e6"/>
      <stop offset="45%" stop-color="#1f86c4"/>
      <stop offset="100%" stop-color="#0a2f6b"/>
    </radialGradient>
    <clipPath id="g"><circle cx="248" cy="280" r="120"/></clipPath>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="86" cy="96" r="3.5" opacity=".9"/>
    <circle cx="430" cy="120" r="2.6" opacity=".7"/>
    <circle cx="112" cy="200" r="2.2" opacity=".6"/>
    <circle cx="404" cy="404" r="3" opacity=".75"/>
    <circle cx="150" cy="430" r="2.4" opacity=".6"/>
    <circle cx="360" cy="64" r="2" opacity=".5"/>
  </g>

  <!-- globe -->
  <circle cx="248" cy="280" r="120" fill="url(#globe)"/>
  <g clip-path="url(#g)">
    <!-- continents -->
    <g fill="#46b98f" opacity=".9">
      <path d="M150 230 q38 -26 78 -10 q26 12 8 40 q-20 28 -60 22 q-44 -8 -26 -52 z"/>
      <path d="M250 320 q40 -8 60 18 q16 26 -14 44 q-40 20 -66 -8 q-22 -34 20 -54 z"/>
      <path d="M300 210 q30 -6 36 16 q4 22 -22 26 q-30 2 -28 -22 z"/>
    </g>
    <!-- graticule -->
    <g stroke="#dff4ff" stroke-width="3" fill="none" opacity=".22">
      <ellipse cx="248" cy="280" rx="44" ry="120"/>
      <ellipse cx="248" cy="280" rx="92" ry="120"/>
      <line x1="248" y1="160" x2="248" y2="400"/>
      <line x1="128" y1="280" x2="368" y2="280"/>
      <line x1="150" y1="218" x2="346" y2="218"/>
      <line x1="150" y1="342" x2="346" y2="342"/>
    </g>
  </g>
  <circle cx="248" cy="280" r="120" fill="none" stroke="#06122b" stroke-width="4" opacity=".5"/>

  <!-- orbit -->
  <g transform="rotate(-22 248 280)">
    <ellipse cx="248" cy="280" rx="196" ry="84" fill="none"
             stroke="#eaf7ff" stroke-width="12" stroke-linecap="round"
             stroke-dasharray="26 20" opacity=".95" filter="url(#glow)"/>
  </g>

  <!-- tracked ISS marker (on the orbit's rotated rightmost vertex) -->
  <g filter="url(#glow)">
    <circle cx="430" cy="207" r="24" fill="#fc3d21" stroke="#ffffff" stroke-width="6"/>
  </g>
  <g stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity=".95">
    <line x1="430" y1="168" x2="430" y2="183"/>
    <line x1="430" y1="231" x2="430" y2="246"/>
    <line x1="391" y1="207" x2="406" y2="207"/>
    <line x1="454" y1="207" x2="469" y2="207"/>
  </g>
</svg>
